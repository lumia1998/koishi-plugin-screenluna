name: Release Agent

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Package agent
        run: |
          cd client
          zip -r ../monitorluna-agent.zip \
            screenshot-server.py \
            start-silent.vbs \
            start-server.bat \
            pyproject.toml \
            requirements.txt \
            monitorluna.user.js \
            uv.lock

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: monitorluna-agent.zip
          generate_release_notes: true
