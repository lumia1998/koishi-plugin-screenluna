<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>MonitorLuna</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  width: 300px;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  font-size: 13px;
  background: #f8f9fa;
}
.header {
  background: #1976d2;
  color: #fff;
  padding: 14px 16px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.header img { width: 20px; height: 20px; }
.header h1 { font-size: 15px; font-weight: 600; }
.status-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  margin-left: auto;
  flex-shrink: 0;
}
.status-dot.connected { background: #69f0ae; }
.status-dot.disconnected { background: #ff5252; }
.status-dot.connecting { background: #ffd740; animation: blink 1s infinite; }
@keyframes blink { 50% { opacity: 0.3; } }
.status-text {
  font-size: 11px;
  color: rgba(255,255,255,0.8);
  margin-left: 4px;
}
.body { padding: 14px 16px; }
.field { margin-bottom: 10px; }
label {
  display: block;
  margin-bottom: 4px;
  font-weight: 500;
  color: #555;
  font-size: 12px;
}
input {
  width: 100%;
  padding: 7px 10px;
  border: 1px solid #ddd;
  border-radius: 6px;
  font-size: 13px;
  outline: none;
  transition: border 0.2s;
  background: #fff;
}
input:focus { border-color: #1976d2; }
btn-row { display: flex; gap: 8px; margin-top: 14px; }
button {
  flex: 1;
  padding: 8px;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  font-size: 13px;
  font-weight: 500;
  transition: background 0.2s;
}
.btn-save { background: #1976d2; color: #fff; }
.btn-save:hover { background: #1565c0; }
.toast {
  margin-top: 10px;
  padding: 7px 10px;
  border-radius: 6px;
  font-size: 12px;
  text-align: center;
  display: none;
}
.toast.ok { background: #e8f5e9; color: #2e7d32; }
.toast.err { background: #ffebee; color: #c62828; }
</style>
</head>
<body>
<div class="header">
  <img src="icon16.png">
  <h1>MonitorLuna</h1>
  <span class="status-dot disconnected" id="dot"></span>
  <span class="status-text" id="statusText">未连接</span>
</div>
<div class="body">
  <div class="field">
    <label>服务器地址</label>
    <input type="text" id="url" placeholder="ws://192.168.1.100:5140/monitorluna">
  </div>
  <div class="field">
    <label>Token</label>
    <input type="password" id="token" placeholder="与 Koishi 配置一致">
  </div>
  <div class="field">
    <label>设备名称</label>
    <input type="text" id="deviceId" placeholder="my-pc">
  </div>
  <button class="btn-save" id="save">保存并连接</button>
  <div class="toast" id="toast"></div>
</div>
<script src="popup.js"></script>
</body>
</html>
